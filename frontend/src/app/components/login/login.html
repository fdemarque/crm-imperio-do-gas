<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-lg border border-gray-100">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Império do Gás</h1>
      <p class="text-gray-500">Faça login para acessar o CRM</p>
    </div>
    
    <form (ngSubmit)="doLogin()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input type="email" value="admin@imperiodogas.com.br" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" value="123456" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" required>
      </div>
      <button type="submit" class="w-full py-3 px-4 bg-orange-500 hover:bg-orange-600 text-white font-medium rounded-lg transition duration-200">
        Entrar no Painel
      </button>
    </form>
  </div>
</div>
