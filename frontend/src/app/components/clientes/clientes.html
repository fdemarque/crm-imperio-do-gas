<div class="min-h-screen bg-gray-50 flex flex-col">
  <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Clientes</h1>
    <nav class="flex gap-4 items-center">
      <button (click)="toggleRole()" class="text-xs px-3 py-1.5 bg-indigo-50 border border-indigo-100 rounded-full text-indigo-700 hover:bg-indigo-100 shadow-sm transition">
        Role Atual: {{ userRole | uppercase }}
      </button>
      <a routerLink="/clientes" class="text-orange-500 font-medium">Clientes</a>
      <a routerLink="/automacoes" class="text-gray-500 hover:text-gray-800">Automações</a>
    </nav>
  </header>
  
  <main class="flex-1 p-8">
    <div class="max-w-6xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Gerenciar Clientes</h2>
        <div class="flex gap-3">
          <button *ngIf="userRole === 'adm'" (click)="fileInput.click()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 transition shadow-sm font-medium">
            Importar CSV
          </button>
          <input type="file" #fileInput (change)="importCsv($event)" accept=".csv" class="hidden" />
          
          <button (click)="openModal()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg shadow font-medium transition">
            + Novo Cliente
          </button>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="text-gray-500 text-sm border-b border-gray-200">
              <th class="pb-3 font-medium">Nome</th>
              <th class="pb-3 font-medium">Documento</th>
              <th class="pb-3 font-medium">Telefone</th>
              <th class="pb-3 font-medium text-right">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b border-gray-100 hover:bg-gray-50">
              <td class="py-4 text-gray-800 font-medium">João Silva</td>
              <td class="py-4 text-gray-600">123.456.789-00</td>
              <td class="py-4 text-gray-600">(11) 99999-9999</td>
              <td class="py-4 text-right">
                <button *ngIf="userRole === 'adm'" class="text-blue-500 hover:text-blue-700 font-medium mr-3">Editar</button>
                <button *ngIf="userRole === 'adm'" class="text-red-500 hover:text-red-700 font-medium">Excluir</button>
                <span *ngIf="userRole !== 'adm'" class="text-gray-400 text-sm italic">Sem permissão</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Novo Cliente -->
  <div *ngIf="isModalOpen" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-xl rounded-xl shadow-2xl p-6 transform transition-all">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-gray-800">Novo Cliente</h3>
        <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
          <input type="text" [(ngModel)]="newClient.name" placeholder="Ex: Maria Oliveira" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CPF/CNPJ</label>
          <input type="text" [(ngModel)]="newClient.document" placeholder="000.000.000-00" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Data de Nascimento</label>
          <input type="date" [(ngModel)]="newClient.birthdate" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
          <input type="text" [(ngModel)]="newClient.phone" placeholder="(11) 90000-0000" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input type="email" [(ngModel)]="newClient.email" placeholder="email@exemplo.com" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
          <input type="text" [(ngModel)]="newClient.address" placeholder="Rua, Número, Bairro, Cidade" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
        </div>
      </div>
      
      <div class="mt-8 flex justify-end gap-3 pt-4 border-t border-gray-100">
        <button (click)="closeModal()" class="px-5 py-2 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition">Cancelar</button>
        <button (click)="saveClient()" class="px-5 py-2 bg-orange-500 text-white font-medium rounded-lg hover:bg-orange-600 transition shadow">Salvar Cliente</button>
      </div>
    </div>
  </div>
</div>
